    <title>Sudoku</title>
    <style>
        :root {
          color-scheme: light;
          --bg: #f4f7fb;
          --surface: #ffffff;
          --surface-2: #edf3f9;
          --surface-3: #dde8f2;
          --text: #213044;
          --muted: #66778c;
          --line: #b7c5d6;
          --line-strong: #4c5867;
          --blue: #1a73e8;
          --blue-soft: #d7e8ff;
          --blue-softer: #eaf3ff;
          --lime: #9cff35;
          --lime-soft: #dcffb5;
		  --pencilerasebutton: #d7e1ee;
          --lime-text: #195700;
          --lime-glow: rgba(156, 255, 53, .56);
          --danger: #d93025;
          --danger-soft: #ffe7e5;
          --shell: rgba(255, 255, 255, .48);
          --shadow: 0 0px 46px rgba(28, 48, 74, .12);
          --radius: 999px;
          --cell-size: clamp(34px, 8.2vmin, 64px);
          --board-size: calc(var(--cell-size) * 9);
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
    @keyframes cellPulse {
        0% {
            transform: scale(1);
        }
        30% {
            transform: scale(1.16);
        }
        100% {
            transform: scale(1);
        }
    }.cell.related {
        background: color-mix(in srgb, var(--blue) 12%, var(--surface));
    }
    
    .cell.same-number {
        background: color-mix(in srgb, var(--blue) 20%, var(--surface));
    }
    .win-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
            transform: translateY(110vh);
    
        opacity: 0;
        pointer-events: none;
    transition: transform 1000ms cubic-bezier(0.16, 1, 0.3, 1),
                opacity 0ms ease;
    
        z-index: 5000;
    }
    
    .win-overlay.show {
        opacity: 1;
        pointer-events: auto;
        position: fixed;
        transform: translateY(-1vh);

    }
    
    .win-card {
        width: min(420px, calc(100vw - 32px));
    
        background: var(--surface);
        border-radius: 22px;
    
        padding: 32px;
    
    
        box-shadow:
            0 24px 64px rgb(0 0 0 /.28),
            0 8px 24px rgb(0 0 0 /.16);
    
        text-align: center;
    
        transform: scale(.9) translateY(20px);
        opacity: 0;
    
        transition:
            transform .28s cubic-bezier(.22,1,.36,1),
            opacity .28s ease;
    }
    
    .win-overlay.show .win-card {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
    .cell.related.same-number {
        background: color-mix(in srgb, var(--blue) 30%, var(--surface));
    }
    
    .cell-complete-pop {
        animation: cellPulse 180ms ease-out;
    }
    .column-complete-flash {
        position: absolute;
        background: var(--lime);
        opacity: 0.45;
        pointer-events: none;
        border-radius: 6px;
        transform-origin: center;
        animation: columnFlash 0.9s ease-out forwards;
    }
    
    @keyframes columnFlash {
        0% {
            transform: scaleY(0);
            opacity: 0.55;
        }
    
        35% {
            transform: scaleY(1);
            opacity: 0.55;
        }
    
        70% {
            transform: scaleY(1);
            opacity: 0.55;
        }
    
        100% {
            transform: scaleY(1);
            opacity: 0;
        }
    }
        body.dark {
		  overflow: hidden;
          color-scheme: dark;
          --bg: #101418;
          --surface: #171d24;
          --surface-2: #202833;
          --surface-3: #2a3442;
          --text: #95a4b6;
          --muted: #98a7b8;
          --line: #4e6177;
          --blue: #73a7ff;
          --blue-soft: #203a5f;
          --blue-softer: #1b2c45;
          --lime: #a7ff48;
	      --pencilerasebutton: #1b2129;
          --lime-soft: #263d1d;
          --lime-text: #bcff76;
          --lime-glow: rgba(167, 255, 72, .46);
          --danger: #ff8a80;
          --danger-soft: #4c2424;
          --shell: rgba(255, 255, 255, .045);
          --shadow: 0 5px 48px rgba(0, 0, 0, .32);
        }
    .row-complete-flash {
        position: absolute;
        background: var(--lime);
        opacity: 0.45;
        pointer-events: none;
        border-radius: 6px;
        transform-origin: center;
        animation: rowFlash 0.9s ease-out forwards;
    }
    
    @keyframes rowFlash {
        0% {
            transform: scaleX(0);
            opacity: 0.55;
        }
    
        35% {
            transform: scaleX(1);
            opacity: 0.55;
        }
    
        70% {
            transform: scaleX(1);
            opacity: 0.55;
        }
    
        100% {
            transform: scaleX(1);
            opacity: 0;
        }
    }
    
        * {
          box-sizing: border-box;
        }
    
        html,
        body {
          height: 100%;
        }
    
        body {
          margin: 0;
          min-height: 100%;
          background:
            radial-gradient(circle at 15% 15%, color-mix(in srgb, var(--blue) 10%, transparent), transparent 30%),
            linear-gradient(135deg, var(--bg), color-mix(in srgb, var(--surface-2) 40%, var(--bg)));
          color: var(--text);
          display: grid;
          place-items: center;
          padding: 28px;
          letter-spacing: 0;
        }
    .box-complete-flash {
        position: absolute;
        pointer-events: none;
        overflow: hidden;
    }
    
    .box-complete-flash::before {
        content: "";
        position: absolute;
        width: 24px;
        height: 24px;
        background: var(--lime);
        opacity: .45;
        transform: translate(-50%, -50%) scale(0);
        animation: boxWave .9s ease-out forwards;
    }

}
    @keyframes boxWave {
        0% {
            transform: translate(-50%, -50%) scale(0) rotate(0deg);
            opacity: .55;
        }
    
        25% {
            transform: translate(-50%, -50%) scale(1.8) rotate(6deg);
            opacity: .55;
        }
    
        60% {
            transform: translate(-50%, -50%) scale(4.2) rotate(12deg);
            opacity: .4;
        }
    
        100% {
            transform: translate(-50%, -50%) scale(6.3) rotate(18deg);
            opacity: 0;
        }
    }
    .box-wave {
        position: absolute;
        width: 22px;
        height: 22px;
    
        border-radius: 1px; /* rounded square, not 50% */
    
        background: var(--lime);
    
        transform: translate(-50%, -50%) scale(0);
        opacity: .55;
    
        animation: boxWave 10s cubic-bezier(.22,1,.36,1) forwards;
    }
        .game-shell {
          width: min(1120px, calc(100vw - 32px));
          padding: clamp(14px, 2.2vw, 26px);
          border: 1px solid color-mix(in srgb, var(--surface-3) 70%, transparent);
          border-radius: 66px;
          background: var(--shell);
          box-shadow: 0 5px 15px rgba(12, 22, 36, .12);
          backdrop-filter: blur(10px);
        }
    
        button,
        select {
          font: inherit;
        }
    
        button {
          border: 0;
          cursor: pointer;
        }
    
        .app {
          width: 100%;
          display: grid;
          grid-template-columns: minmax(0, var(--board-size)) minmax(280px, 330px);
          gap: clamp(24px, 3.4vw, 44px);
          align-items: start;
          justify-content: center;
        }
    
        .main {
          min-width: 0;
          display: grid;
          gap: 18px;
        }
    
        .topbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 14px;
          min-height: 44px;
        }
    
        .brand {
          display: flex;
          align-items: center;
          gap: 12px;
          min-width: 0;
        }
    
        .mark {
          width: 38px;
          height: 38px;
          border-radius: 8px;
          background: conic-gradient(from 0deg, #1a73e8, #40b56a, #fbbc04, #d93025, #1a73e8);
          display: grid;
          place-items: center;
        }
    
        .mark-grid {
          width: 24px;
          height: 24px;
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(3, 1fr);
          gap: 2px;
        }
    
        .mark-grid span {
          background: rgba(255, 255, 255, .92);
          border-radius: 2px;
        }
    
        h1 {
          margin: 0;
          font-size: clamp(1.55rem, 5vw, 2.6rem);
          line-height: 1;
          font-weight: 800;
          letter-spacing: 0;
        }
    
        .difficulty-badge {
          color: var(--muted);
          font-weight: 700;
          font-size: .95rem;
          margin-top: 5px;
        }
    
        .theme-toggle {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          display: grid;
          place-items: center;
          color: var(--text);
          background: var(--surface);
          border: 1px solid var(--surface-3);
          box-shadow: 0 10px 22px rgba(34, 53, 80, .1);
        }
    
        .theme-toggle svg {
          width: 20px;
          height: 20px;
        }
    
        .board-wrap {
          width: min(var(--board-size), 100%);
          max-width: 100%;
          position: relative;
        }
    
        .board {
          width: 100%;
          aspect-ratio: 1;
          display: grid;
          grid-template-columns: repeat(9, 1fr);
          grid-template-rows: repeat(9, 1fr);
          background: var(--line-strong);
          border: 4px solid var(--line-strong);
          border-radius: 4px;
          overflow: hidden;
          touch-action: manipulation;
        }
    
        .cell {
          position: relative;
          display: grid;
          place-items: center;
          min-width: 0;
          min-height: 0;
          background: var(--surface);
          color: var(--blue);
          font-size: clamp(1.25rem, 4.5vmin, 2.2rem);
          font-weight: 600;
          line-height: 1;
          border-right: 1px solid var(--line);
          border-bottom: 1px solid var(--line);
          transition: background .14s ease, color .14s ease, box-shadow .14s ease;
          user-select: none;
          overflow: hidden;
          isolation: isolate;
        }
    
        .cell:nth-child(3n) {
          border-right-width: 3px;
          border-right-color: var(--line-strong);
        }
    
        .cell:nth-child(9n) {
          border-right: 0;
        }
    
        .cell:nth-child(n + 19):nth-child(-n + 27),
        .cell:nth-child(n + 46):nth-child(-n + 54) {
          border-bottom-width: 3px;
          border-bottom-color: var(--line-strong);
        }
    
        .cell:nth-child(n + 73) {
          border-bottom: 0;
        }
    
        .cell.given {
          color: var(--text);
          font-weight: 760;
        }
    
        .cell.correct {
          background: var(--lime-soft);
          color: var(--lime-text);
        }
    
        .cell.selected {
          background: var(--blue-soft);
          box-shadow: inset 0 0 0 3px var(--blue);
          z-index: 1;
        }
    
        .cell.error {
          color: var(--danger);
          background: var(--danger-soft);
        }
    
        .cell.completed {
          background: var(--surface);
          color: var(--text);
        }
    
        .cell.completed.selected {
          background: var(--surface);
        }
    
        .note-grid {
          width: 100%;
          height: 100%;
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(3, 1fr);
          padding: clamp(3px, .85vmin, 7px);
          color: var(--muted);
          font-size: clamp(.48rem, 1.5vmin, .78rem);
          font-weight: 800;
          line-height: 1;
        }
    
        .note-grid span {
          display: grid;
          place-items: center;
          min-width: 0;
          min-height: 0;
        }
    
        .cell.complete-sweep::after {
        content: "";
        position: absolute;
        inset: 2px;
    
        border: 3px solid var(--lime);
        border-radius: 8px;
    
        background: var(--lime);
    
        z-index: -1;
    
        transform-origin: center;
        animation: columnGrow .5s cubic-bezier(.22,1,.36,1) var(--sweep-delay, 0ms) forwards;
    
        }
    
    .cell.complete-sweep.column::after {
        content: "";
        position: absolute;

    
        border: 3px solid var(--lime);
        border-radius: 8px;
    
        background: var(--lime);
    
        z-index: -1;
    
        transform-origin: center;
        animation:
    columnGrow .5s cubic-bezier(.22,1,.36,1)
        var(--sweep-delay, 0ms) forwards,
    rippleFade .35s ease
        var(--fade-delay, 1000ms) forwards;
    }
	.complete-effect {
    position: absolute;
    inset: 2px;

    pointer-events: none;

    border: 3px solid var(--lime);
    border-radius: 8px;
    background: var(--lime);

    z-index: -1;
}
.complete-effect.column {
    transform-origin: center;

    animation:
        columnGrow .5s cubic-bezier(.22,1,.36,1)
            var(--sweep-delay,0ms) forwards,

        rippleFade .35s ease
            var(--fade-delay,1000ms) forwards;
}

.complete-effect.row {
    transform-origin: center;

    animation:
        columnGrow .5s cubic-bezier(.22,1,.36,1)
            var(--sweep-delay,0ms) forwards,

        rippleFade .35s ease
            var(--fade-delay,1000ms) forwards;
}


.complete-effect.box {
    animation:
        boxGrow .5s cubic-bezier(.22,1,.36,1)
            var(--sweep-delay,0ms) forwards;
}

.complete-effect.board {
    animation:
        columnGrow .5s cubic-bezier(.22,1,.36,1)
            var(--sweep-delay,0ms) forwards,

        rippleFade .35s ease
            var(--fade-delay,1000ms) forwards;
}
@keyframes columnGrow {
    0% {
        transform: scaleY(.15) scaleX(.9) rotate(0deg);
        opacity: 1;
    }

    80% {
        transform: scaleY(1.05) scaleX(1) rotate(6deg);
        opacity: 1;
    }

    100% {
        transform: scaleY(1.05) scaleX(1) rotate(6deg);
        opacity: 1;
    }
}
@keyframes rippleFade {
    from {
        opacity: 1;
    }

    to {
        opacity: 0;
    }
}
    
    .cell.complete-sweep.box::after {
        content: "";
        position: absolute;
        inset: 2px;
    
        border: 3px solid var(--lime);
        border-radius: 8px;
    z-index: -1;
    
        background: var(--lime);
    
        animation: boxGrow .5s cubic-bezier(.22,1,.36,1) var(--sweep-delay,0ms) forwards;

    @keyframes boxGrow {
        0% {

              function shuffle(items) {
                const copy = [...items];
                for (let i = copy.length - 1; i > 0; i -= 1) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [copy[i], copy[j]] = [copy[j], copy[i]];
                }
                return copy;
              }
        
              function boxIndex(row, col) {
                return Math.floor(row / 3) * 3 + Math.floor(col / 3);
              }
        
              function canPlace(grid, index, value) {
                const row = Math.floor(index / 9);
                const col = index % 9;
                for (let i = 0; i < 9; i += 1) {
                  if (grid[row * 9 + i] === value || grid[i * 9 + col] === value) return false;
                }
                return boxes[boxIndex(row, col)].every((cellIndex) => grid[cellIndex] !== value);
              }
        
              function fillGrid(grid, index = 0) {
                if (index === 81) return true;
                if (grid[index] !== 0) return fillGrid(grid, index + 1);
                for (const value of shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9])) {
                  if (canPlace(grid, index, value)) {
                    grid[index] = value;
                    if (fillGrid(grid, index + 1)) return true;
                    grid[index] = 0;
                  }
                }
                return false;
              }
        
              function countSolutions(grid, limit = 2) {
                const emptyIndex = grid.findIndex((value) => value === 0);
                if (emptyIndex === -1) return 1;
                let count = 0;
                for (let value = 1; value <= 9; value += 1) {
                  if (canPlace(grid, emptyIndex, value)) {
                    grid[emptyIndex] = value;
                    count += countSolutions(grid, limit);
                    grid[emptyIndex] = 0;
                    if (count >= limit) return count;
                  }
                }
                return count;
              }
        
              function makePuzzle(holes) {
                const full = Array(81).fill(0);
                fillGrid(full);
                const draft = [...full];
                const order = shuffle(Array.from({ length: 81 }, (_, i) => i));
                let removed = 0;
        
                for (const index of order) {
                  if (removed >= holes) break;
                  const keep = draft[index];
                  draft[index] = 0;
                  const probe = [...draft];
                  if (countSolutions(probe, 2) === 1) {
                    removed += 1;
                  } else {
                    draft[index] = keep;
                  }
                }
        
                return { full, draft };
              }

              }

                paintBoard();
              }
        
              function renderNumberPad() {
                numberGrid.innerHTML = "";
                for (let value = 1; value <= 9; value += 1) {
                  const button = document.createElement("button");
                  button.className = "number-button";
                  button.type = "button";
                  button.textContent = value;
                  button.dataset.value = String(value);
                  button.setAttribute("aria-label", `Use ${value}`);
                  button.addEventListener("click", () => placeNumber(value));
				  
                  numberGrid.appendChild(button);
                }
              }
			  
        
              function renderNotes(noteSet) {
                const grid = document.createElement("div");
                grid.className = "note-grid";
                for (let value = 1; value <= 9; value += 1) {
                  const mark = document.createElement("span");
                  mark.textContent = noteSet.has(value) ? value : "";
                  grid.appendChild(mark);
                }
                return grid;
              }
        
              function getCompletedCellSet(units = getCompletedUnits()) {
                const completed = new Set();
                units.rows.forEach((done, index) => {
                  if (done) rows[index].forEach((cellIndex) => completed.add(cellIndex));
                });
                units.cols.forEach((done, index) => {
                  if (done) cols[index].forEach((cellIndex) => completed.add(cellIndex));
                });
                units.boxes.forEach((done, index) => {
                  if (done) boxes[index].forEach((cellIndex) => completed.add(cellIndex));
                });
                return completed;
              }
        
         function paintBoard() {
            const selectedValue = selected >= 0 ? values[selected] : 0;
            const selectedRow = Math.floor(selected / 9);
            const selectedCol = selected % 9;
            const selectedBoxRow = Math.floor(selectedRow / 3);
            const selectedBoxCol = Math.floor(selectedCol / 3);
        
            const completedCells = getCompletedCellSet();
        
            boardEl.querySelectorAll(".cell").forEach((cell) => {
                const i = Number(cell.dataset.index);
                const row = Math.floor(i / 9);
                const col = i % 9;
                const boxRow = Math.floor(row / 3);
                const boxCol = Math.floor(col / 3);
        
                const value = values[i];
                const complete = completedCells.has(i);
                const userValue = value !== 0 && !givens[i];
        
// Remove everything except active animation effects.
for (const child of [...cell.childNodes]) {
    if (
        child.nodeType === Node.ELEMENT_NODE &&
        child.classList.contains("complete-effect")
    ) {
        continue;
    }

    child.remove();
}

if (value) {
    cell.append(value);
} else if (notes[i]?.size) {
    cell.append(renderNotes(notes[i]));
}
        
                cell.classList.toggle("given", givens[i]);
                cell.classList.toggle("selected", i === selected);
                cell.classList.toggle("completed", complete);
                cell.classList.toggle("correct", userValue && value === solution[i] && !complete);
                cell.classList.toggle("error", userValue && value !== solution[i] && !complete);
        
                // Highlight same row, column and box
                cell.classList.toggle(
                    "related",
                    selected >= 0 &&
                    (
                        row === selectedRow ||
                        col === selectedCol ||
                        (boxRow === selectedBoxRow && boxCol === selectedBoxCol)
                    )
                );
        
                // Highlight matching numbers
                cell.classList.toggle(
                    "same-number",
                    selectedValue !== 0 &&
                    value === selectedValue
                );
        
                cell.setAttribute("aria-selected", i === selected ? "true" : "false");
            });
        
            updateNumberCounts();
            updateStatus();
            updateHistoryButtons();
        }
        
              function selectCell(index) {
                selected = index;
                paintBoard();
            if (eraseMode) {
                eraseSelected();
            }
              }
        
              function cellSnapshot(index) {
                return {
                  value: values[index],
                  notes: [...(notes[index] || [])].sort((a, b) => a - b)
                };
              }
        
              function sameCellState(a, b) {
                return a.value === b.value && a.notes.length === b.notes.length && a.notes.every((note, index) => note === b.notes[index]);
              }
        
              function restoreCell(index, state) {
                values[index] = state.value;
                notes[index] = new Set(state.notes);
              }
        
              function makeChangeList(beforeStates) {
                const changes = [];
                beforeStates.forEach((before, index) => {
                  const after = cellSnapshot(index);
                  if (!sameCellState(before, after)) changes.push({ index, before, after });
                });
                return changes;
              }
        
              function pushChanges(changes, activeIndex = selected) {
                if (!changes.length) return;
                undoStack.push({ selected: activeIndex, changes });
                redoStack = [];
                updateHistoryButtons();
              }
        
              function collectNewlyCompleted(previous, next) {
                const indexes = new Set();
                next.rows.forEach((done, index) => {
                  if (done && !previous.rows[index]) rows[index].forEach((cellIndex) => indexes.add(cellIndex));
                });
                next.cols.forEach((done, index) => {
                  if (done && !previous.cols[index]) cols[index].forEach((cellIndex) => indexes.add(cellIndex));
                });
                next.boxes.forEach((done, index) => {
                  if (done && !previous.boxes[index]) boxes[index].forEach((cellIndex) => indexes.add(cellIndex));
                });
                return indexes;
              }
        function showWinScreen() {

            winDifficulty.textContent =
                difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
        
            winTime.textContent = formatTime(elapsed);
            winMistakes.textContent = mistakes;
        
            winOverlay.hidden = false;
        
            requestAnimationFrame(() => {
                winOverlay.classList.add("show");
            });
        
        }
        
              function scrubNotes(indexes, beforeStates) {
                indexes.forEach((index) => {
                  if (!beforeStates.has(index)) beforeStates.set(index, cellSnapshot(index));
                  notes[index].clear();
                });
              }
        
        function togglePencilMode(force) {
          pencilMode = typeof force === "boolean" ? force : !pencilMode;
        
          if (pencilMode) {
            eraseMode = false;
          }
        
          pencilButton.setAttribute("aria-pressed", pencilMode);
          eraseButton.setAttribute("aria-pressed", eraseMode);
        }
        
        function toggleEraseMode(force) {
          eraseMode = typeof force === "boolean" ? force : !eraseMode;
        
          if (eraseMode) {
            pencilMode = false;
          }
        
          eraseButton.setAttribute("aria-pressed", eraseMode);
          pencilButton.setAttribute("aria-pressed", pencilMode);
        }
              function placeNumber(value, options = {}) {
			  if (timerPaused) { return };
                if (finished || givens[selected]) return;
                if (eraseMode) {
                   toggleEraseMode(false);
                }
                const beforeStates = new Map([[selected, cellSnapshot(selected)]]);
        
                if (pencilMode) {
                  if (values[selected] !== 0) return;
                  if (notes[selected].has(value)) notes[selected].delete(value);
                  else notes[selected].add(value);
                  if (!options.fromHistory) pushChanges(makeChangeList(beforeStates), selected);
                  paintBoard();
                  return;
                }
        
                if (values[selected] === value && notes[selected].size === 0) return;
                const previousCompleted = getCompletedUnits();
                values[selected] = value;
                notes[selected].clear();
                const nextCompleted = getCompletedUnits();
                scrubNotes(collectNewlyCompleted(previousCompleted, nextCompleted), beforeStates);
                if (!options.fromHistory) pushChanges(makeChangeList(beforeStates), selected);
                if (value !== 0 && value !== solution[selected] && !options.fromHistory) mistakes += 1;
                paintBoard();
                animateNewCompletions(previousCompleted, selected);
                checkWin();
              }
        
              function eraseSelected() {
                if (finished || givens[selected]) return;
                if (values[selected] === 0 && notes[selected].size === 0) return;
                const beforeStates = new Map([[selected, cellSnapshot(selected)]]);
                values[selected] = 0;
                notes[selected].clear();
                pushChanges(makeChangeList(beforeStates), selected);
                paintBoard();
              }
        
              function applyHistoryMove(move, direction) {
                if (!move) return;
                const previousCompleted = getCompletedUnits();
                selected = move.selected;
                move.changes.forEach((change) => {
                  restoreCell(change.index, direction === "undo" ? change.before : change.after);
                });
                paintBoard();
                animateNewCompletions(previousCompleted, selected);
                checkWin();
              }
        
              function undo() {
                const move = undoStack.pop();
                if (!move) return;
                redoStack.push(move);
                applyHistoryMove(move, "undo");
              }
        
              function redo() {
                const move = redoStack.pop();
                if (!move) return;
                undoStack.push(move);
                applyHistoryMove(move, "redo");
              }
        
              function hint() {
                if (finished) return;
                let target = selected;
                if (givens[target] || values[target] === solution[target]) {
                  target = values.findIndex((value, index) => !givens[index] && value !== solution[index]);
                }
                if (target === -1) return;
                selected = target;
                const beforeStates = new Map([[target, cellSnapshot(target)]]);
                const previousCompleted = getCompletedUnits();
                values[target] = solution[target];
                notes[target].clear();
                const nextCompleted = getCompletedUnits();
                scrubNotes(collectNewlyCompleted(previousCompleted, nextCompleted), beforeStates);
                pushChanges(makeChangeList(beforeStates), target);
                paintBoard();
                animateNewCompletions(previousCompleted, selected);
                checkWin();
              }
        
              function updateHistoryButtons() {
                undoButton.disabled = undoStack.length === 0;
                redoButton.disabled = redoStack.length === 0;
              }
        
              function updateNumberCounts() {
                const counts = Array(10).fill(0);
                values.forEach((value) => {
                  if (value > 0) counts[value] += 1;
                });
                numberGrid.querySelectorAll(".number-button").forEach((button) => {
                  const value = Number(button.dataset.value);
                  button.classList.toggle("used-up", counts[value] >= 9);
                });
              }
        
              function updateStatus() {
                const empty = values.filter((value) => value === 0).length;
                mistakeStatus.textContent = `Mistakes: ${mistakes}`;
                emptyStatus.textContent = `Empty: ${empty}`;
              }
        
              function isUnitComplete(indexes) {
                const seen = new Set();
                for (const index of indexes) {
                  const value = values[index];
                  if (value === 0 || value !== solution[index] || seen.has(value)) return false;
                  seen.add(value);
                }
                return seen.size === 9;
              }
        
              function getCompletedUnits() {
                return {
                  rows: rows.map(isUnitComplete),
                  cols: cols.map(isUnitComplete),
                  boxes: boxes.map(isUnitComplete)
                };
              }
        
function animateIndexes(indexes, origin, kind) {

    const boardDistances =
        kind === "board"
            ? getBoardDistances(origin)
            : null;

    const maxDistance =
        kind === "board"
            ? Math.max(...boardDistances)
            : 8;

    const fadeDelay = maxDistance * 60 + 500;

    indexes.forEach((index) => {

        const cell = boardEl.querySelector(`[data-index="${index}"]`);
        if (!cell) return;

        const row = Math.floor(index / 9);
        const col = index % 9;

        const originRow = Math.floor(origin / 9);
        const originCol = origin % 9;

        let distance;

        if (kind === "row") {

            distance = Math.abs(col - originCol);

        } else if (kind === "column") {

            distance = Math.abs(row - originRow);

        } else if (kind === "box") {

            distance =
                Math.abs(row - originRow) +
                Math.abs(col - originCol);

        } else {

            distance = boardDistances[index];

        }

        const animationKind =
            kind === "board"
                ? "board"
                : kind;

        const effect = document.createElement("div");

        effect.className = `complete-effect ${animationKind}`;

        effect.style.setProperty(
            "--sweep-delay",
            `${distance * 60}ms`
        );

        effect.style.setProperty(
            "--fade-delay",
            `${fadeDelay}ms`
        );

        cell.appendChild(effect);

        effect.addEventListener("animationend", (e) => {

            // Remove after the fade finishes.
            if (e.animationName !== "rippleFade") return;

            effect.remove();

        });

    });

}
        const allIndexes = [...Array(81).keys()];
        animateIndexes(allIndexes, selected, "board");
        
              function animateNewCompletions(previous, origin) {
                const next = getCompletedUnits();
                next.rows.forEach((done, index) => {
                  if (done && !previous.rows[index]) animateIndexes(rows[index], origin, "row");
                });
                next.cols.forEach((done, index) => {
                  if (done && !previous.cols[index]) animateIndexes(cols[index], origin, "column");
                });
                next.boxes.forEach((done, index) => {
                  if (done && !previous.boxes[index]) animateIndexes(boxes[index], origin, "box");
                });
              }
			  function playBoardRipple() {
    const distances = getBoardDistances(selected);

    boardEl.querySelectorAll(".cell").forEach((cell, index) => {

        cell.classList.remove("complete-sweep", "board");

        cell.style.setProperty(
            "--sweep-delay",
            `${distances[index] * 60}ms`
        );

        requestAnimationFrame(() => {
            cell.classList.add("complete-sweep", "board");
        });

        setTimeout(() => {
            cell.classList.remove("complete-sweep", "board");
            cell.style.removeProperty("--sweep-delay");
        }, 1000 + distances[index] * 60);
    });
}
function getBoardDistances(startIndex) {
    const distances = Array(81).fill(-1);
    const queue = [startIndex];

    distances[startIndex] = 0;

    while (queue.length) {
        const current = queue.shift();

        const row = Math.floor(current / 9);
        const col = current % 9;

        const neighbors = [];

        if (row > 0) neighbors.push(current - 9);
        if (row < 8) neighbors.push(current + 9);
        if (col > 0) neighbors.push(current - 1);
        if (col < 8) neighbors.push(current + 1);

        for (const next of neighbors) {
            if (distances[next] !== -1) continue;

            distances[next] = distances[current] + 1;
            queue.push(next);
        }
    }

    return distances;
}
function checkWin() {
    if (finished) return;

    if (values.every((value, index) => value === solution[index])) {
        finished = true;   // <-- FIRST thing inside the win block
		pauseTimer()
        clearInterval(timerId);

        playBoardRipple();

        const maxDistance = Math.max(...getBoardDistances(selected));

        setTimeout(showWinScreen, maxDistance * 60 + 900);
    }
}
function forcewin() {
		pauseTimer()
        clearInterval(timerId);

        playBoardRipple();

        const maxDistance = Math.max(...getBoardDistances(selected));

        setTimeout(showWinScreen, maxDistance * 60 + 900);
		}
        
              function closeDifficultyMenu() {
                menuOpen = false;
                difficultyMenu.classList.remove("open");
                difficultyToggle.setAttribute("aria-expanded", "false");
              }
        
              function openDifficultyMenu() {
                menuOpen = true;
                difficultyMenu.classList.add("open");
                difficultyToggle.setAttribute("aria-expanded", "true");
                updateDifficultyMenu();
              }
			                function closewinDifficultyMenu() {
                winmenuOpen = false;
                winDifficultyMenu.classList.remove("open");
                winDifficultyToggle.setAttribute("aria-expanded", "false");
              }
        
              function openwinDifficultyMenu() {
                winmenuOpen = true;
                windifficultyMenu.classList.add("open");

                winDifficultyToggle.setAttribute("aria-expanded", "false");
                updatewinDifficultyMenu();
              }
        
              function toggleDifficultyMenu() {
                if (menuOpen) {
                  closeDifficultyMenu();
                } else {
                  openDifficultyMenu();
                }
              }
			                function togglewinDifficultyMenu() {
                if (winmenuOpen) {
                  closewinDifficultyMenu();
                } else {
                  openwinDifficultyMenu();
                }
              }
        
              function updateDifficultyMenu() {
                difficultyMenu.querySelectorAll(".menu-item").forEach((item) => {
                  item.setAttribute("aria-selected", item.dataset.difficulty === difficulty ? "true" : "false");
                });
              }
              function updatewinDifficultyMenu() {        
				        windifficultyMenu.querySelectorAll(".menu-item").forEach((item) => {
                  item.setAttribute("aria-selected", item.dataset.difficulty === difficulty ? "true" : "false");
                });
	        }

function newGame(nextDifficulty = difficulty) {
    difficulty = nextDifficulty;

    const built = makePuzzle(DIFFICULTIES[difficulty].holes);

    document.title = `Sudoku - ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;

    solution = built.full;
    puzzle = built.draft;
    values = [...puzzle];
    givens = puzzle.map((value) => value !== 0);
    notes = Array.from({ length: 81 }, () => new Set());

    selected = values.findIndex((value) => value === 0);
    if (selected === -1) selected = 40;

    mistakes = 0;
    elapsed = 0;
    pausedElapsed = 0;
    timerPaused = false;
    finished = false;

    hideWinScreen();

    undoStack = [];
    redoStack = [];

    togglePencilMode(false);
    toggleEraseMode(false);

    clearInterval(timerId);

    timerEl.textContent = "Time: 00:00";
    pauseBtn.textContent = "❚❚";
    title.textContent = "Sudoku";

    difficultyBadge.textContent = DIFFICULTIES[difficulty].label;

    winOverlay.classList.remove("show");

    closeDifficultyMenu();
	closewinDifficultyMenu() ;

    renderBoard();
    updateDifficultyMenu();

    startTimer();
}
        
        
        
              renderNumberPad();
              newGame();

undoButton.addEventListener("click", () => {
    if (timerPaused) return;
    undo();
});

redoButton.addEventListener("click", () => {
    if (timerPaused) return;
    redo();
});

hintButton.addEventListener("click", () => {
    if (timerPaused) return;
    hint();
});

eraseButton.addEventListener("click", () => {
    if (timerPaused) return;
    toggleEraseMode();
});

pencilButton.addEventListener("click", () => {
    if (timerPaused) return;
    togglePencilMode();
});
              newGameButton.addEventListener("click", () => newGame());
              winNewGameButton.addEventListener("click", () => newGame());        
              difficultyToggle.addEventListener("click", (event) => {event.stopPropagation();toggleDifficultyMenu();});
              newGameButton.addEventListener("contextmenu", (event) => {event.preventDefault();openDifficultyMenu();});
              newGameBand.addEventListener("contextmenu", (event) => {event.preventDefault();openDifficultyMenu();});
              winnewGameBand.addEventListener("contextmenu", (event) => {event.preventDefault();openDifficultyMenu();});
			  winDifficultyToggle.addEventListener("click", (event) => {
    event.stopPropagation();
    togglewinDifficultyMenu();
});
difficultyMenu.addEventListener("click", (event) => {

    console.log("target:", event.target);

    const item = event.target.closest(".menu-item");

winDifficultyMenu.addEventListener("click", (event) => {
    console.log("listener fired");

    console.log("target:", event.target);

    const item = event.target.closest(".menu-item");

    if (!item) return;

    newGame(item.dataset.difficulty);

});
              document.addEventListener("click", (event) => {
                if (!winnewGameBand.contains(event.target)) closeDifficultyMenu();
				if (timerPaused) return;
              });
        
              document.addEventListener("keydown", (event) => {
			   if (timerPaused) return;
                console.log(event.key);
                const key = event.key.toLowerCase();
                if (key === "escape") {
                  closeDifficultyMenu();
                  return;
                }
        
                if ((event.ctrlKey || event.metaKey) && key === "z") {
                  event.preventDefault();
                  if (event.shiftKey) redo();
                  else undo();
                  return;
                }
                if ((event.ctrlKey || event.metaKey) && key === "y") {
                  event.preventDefault();
                  redo();
                  return;
                }
                if (event.ctrlKey || event.metaKey) return;
        
                if (key === "p") {
                  event.preventDefault();
                  togglePencilMode();
                  return;
                }
        	if (key === "e") {
          	event.preventDefault();
         	toggleEraseMode();
        	return;
        	}
			 if (timerPaused) return;
                if (/^[1-9]$/.test(key)) placeNumber(Number(key));
                if (key === "backspace" || key === "delete" || key === "0") eraseSelected();
                if (["arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) {
                  event.preventDefault();
                  const row = Math.floor(selected / 9);
                  const col = selected % 9;
                  const nextRow = key === "arrowup" ? Math.max(0, row - 1) : key === "arrowdown" ? Math.min(8, row + 1) : row;
                  const nextCol = key === "arrowleft" ? Math.max(0, col - 1) : key === "arrowright" ? Math.min(8, col + 1) : col;
                  selectCell(nextRow * 9 + nextCol);
                }
              });    
		
        </script>
